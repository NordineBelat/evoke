<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EVOKE — Mon espace</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f2f2f7;--white:#fff;--dark:#111118;--text:#111118;--text2:#6b6b80;--text3:#aeaec0;--green:#3ecf6a;--green-light:#b8f0c8;--red:#ff6b6b;--border:rgba(0,0,0,0.07);--sh:0 4px 24px rgba(0,0,0,0.07);--sh2:0 12px 40px rgba(0,0,0,0.12);--rmd:20px;--rlg:28px;--rxl:36px;--rp:100px;}
html,body{min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100vw;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;background:rgba(242,242,247,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;}
.nav-logo{display:flex;align-items:center;gap:.5rem;}
.nav-logo-text{font-size:1.1rem;font-weight:800;color:var(--dark);letter-spacing:-.02em;}
.nav-right{display:flex;align-items:center;gap:.6rem;}
.nav-user{font-size:.72rem;font-weight:700;color:var(--text2);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-plan{font-size:.6rem;font-weight:800;padding:.2rem .55rem;border-radius:100px;text-transform:uppercase;letter-spacing:.06em;}
.nav-plan.starter{background:rgba(99,102,241,.1);color:#6366f1;}
.nav-plan.pro{background:rgba(62,207,106,.1);color:#16a34a;}
.nav-plan.max{background:rgba(245,158,11,.1);color:#d97706;}
.nav-plan.none{background:var(--border);color:var(--text3);}
.btn-logout{padding:.38rem .8rem;background:var(--white);border:1px solid var(--border);border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.68rem;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;}
.btn-logout:hover{color:var(--dark);border-color:rgba(17,17,24,.2);}

/* LAYOUT */
.main{padding-top:60px;max-width:720px;margin:0 auto;padding-left:1.2rem;padding-right:1.2rem;}

/* HERO */
.hero{background:var(--dark);border-radius:var(--rxl);padding:1.8rem;margin:1.2rem 0 1rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.03);}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border-radius:var(--rp);padding:.25rem .7rem;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:.9rem;}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.hero-title{font-size:1.3rem;font-weight:800;color:white;line-height:1.2;margin-bottom:.4rem;}
.hero-sub{font-size:.78rem;color:rgba(255,255,255,.45);line-height:1.5;}
.credits-row{display:flex;align-items:center;gap:.8rem;margin-top:1.2rem;}
.credits-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.08);border-radius:var(--rp);padding:.5rem 1rem;}
.credits-num{font-size:1rem;font-weight:800;color:white;}
.credits-label{font-size:.62rem;font-weight:500;color:rgba(255,255,255,.45);}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--white);border-radius:var(--rp);padding:4px;box-shadow:var(--sh);margin-bottom:1rem;}
.tab{flex:1;padding:.5rem;border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:.7rem;font-weight:700;color:var(--text2);border-radius:var(--rp);cursor:pointer;transition:all .2s;}
.tab.active{background:var(--dark);color:white;}

/* EVENTS */
.section{background:var(--white);border-radius:var(--rxl);padding:1.2rem;box-shadow:var(--sh);margin-bottom:.8rem;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-title{font-size:.65rem;font-weight:800;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;}
.btn-new{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .9rem;background:var(--dark);border:none;border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.7rem;font-weight:800;color:white;cursor:pointer;transition:all .2s;}
.btn-new:hover{opacity:.85;}

.ev-item{background:var(--bg);border-radius:var(--rlg);padding:1rem 1.2rem;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:.8rem;}
.ev-item:hover{background:rgba(17,17,24,.06);}
.ev-item:last-child{margin-bottom:0;}
.ev-left{flex:1;min-width:0;}
.ev-name{font-size:.9rem;font-weight:800;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-date{font-size:.68rem;color:var(--text2);margin-top:2px;}
.ev-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.ev-songs{font-size:.65rem;font-weight:700;color:var(--text2);background:var(--white);border-radius:var(--rp);padding:.2rem .6rem;}
.ev-credits{font-size:.65rem;font-weight:800;color:#1a5c2a;background:var(--green-light);border-radius:var(--rp);padding:.2rem .6rem;}
.ev-arrow{font-size:.8rem;color:var(--text3);}
.empty-state{text-align:center;padding:2.5rem 1rem;}
.empty-icon{font-size:2rem;margin-bottom:.7rem;opacity:.3;}
.empty-text{font-size:.82rem;color:var(--text2);margin-bottom:1rem;}

/* FORM */
.form-section{display:none;}
.form-section.show{display:block;}
.field{margin-bottom:.9rem;}
.field label{display:block;font-size:.62rem;font-weight:800;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:var(--rmd);padding:.82rem 1rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;color:var(--text);outline:none;transition:all .2s;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(17,17,24,.2);background:var(--white);}
.field input::placeholder,.field textarea::placeholder{color:var(--text3);}
.field small{display:block;font-size:.63rem;color:var(--text3);margin-top:.3rem;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
@media(max-width:480px){.f2{grid-template-columns:1fr;}}
.btn-submit{width:100%;padding:1rem;background:var(--dark);border:none;border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:800;color:white;cursor:pointer;transition:all .2s;margin-top:.4rem;}
.btn-submit:hover{opacity:.88;}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{width:100%;padding:.85rem;background:var(--bg);border:none;border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;color:var(--text2);cursor:pointer;margin-top:.5rem;}

/* PROFILE */
.profile-info{display:flex;flex-direction:column;gap:.7rem;}
.info-row{display:flex;align-items:center;gap:.8rem;padding:.7rem .9rem;background:var(--bg);border-radius:var(--rmd);}
.info-label{font-size:.6rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;min-width:80px;}
.info-value{font-size:.82rem;font-weight:600;color:var(--dark);}

/* ALERT */
.alert{border-radius:var(--rmd);padding:.75rem 1rem;font-size:.76rem;font-weight:600;margin-bottom:.8rem;display:none;}
.alert.error{background:rgba(255,107,107,.1);color:#c0392b;border:1px solid rgba(255,107,107,.2);}
.alert.success{background:rgba(62,207,106,.1);color:#1a5c2a;border:1px solid rgba(62,207,106,.2);}
.alert.show{display:block;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:white;padding:.65rem 1.3rem;border-radius:var(--rp);font-size:.75rem;font-weight:700;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--white);border-radius:var(--rxl) var(--rxl) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:1.5rem;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 1.2rem;}
.modal-title{font-size:.95rem;font-weight:800;margin-bottom:1.2rem;}
.modal-actions{display:flex;gap:8px;margin-top:1rem;}
.btn-cancel{flex:1;padding:.75rem;background:var(--bg);border:none;border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:700;color:var(--text2);cursor:pointer;}
.btn-confirm{flex:2;padding:.75rem;background:var(--dark);border:none;border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:800;color:white;cursor:pointer;}
.btn-danger{flex:2;padding:.75rem;background:var(--red);border:none;border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:800;color:white;cursor:pointer;}

/* EVENT DETAIL */
.detail-header{background:var(--dark);border-radius:var(--rxl);padding:1.5rem;margin-bottom:.8rem;}
.detail-couple{font-size:1.2rem;font-weight:800;color:white;margin-bottom:.3rem;}
.detail-date{font-size:.75rem;color:rgba(255,255,255,.45);}
.detail-links{display:flex;flex-direction:column;gap:6px;margin-top:1rem;}
.link-row{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.07);border-radius:var(--rmd);padding:.7rem .9rem;}
.link-label{font-size:.6rem;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;min-width:50px;}
.link-val{flex:1;font-size:.68rem;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-actions{display:flex;gap:5px;flex-shrink:0;}
.link-btn{padding:.28rem .6rem;background:rgba(255,255,255,.1);border:none;border-radius:8px;font-size:.6rem;font-weight:700;color:white;cursor:pointer;transition:background .15s;}
.link-btn:hover{background:rgba(255,255,255,.18);}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:.8rem;}
.stat-box{background:rgba(255,255,255,.07);border-radius:var(--rmd);padding:.7rem;text-align:center;}
.stat-n{font-size:1.3rem;font-weight:800;color:white;line-height:1;}
.stat-l{font-size:.58rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;margin-top:.2rem;}
.song-card{background:var(--white);border-radius:var(--rlg);padding:1rem 1.2rem;margin-bottom:8px;box-shadow:var(--sh);}
.song-title{font-size:.88rem;font-weight:800;color:var(--dark);margin-bottom:.15rem;}
.song-meta{font-size:.68rem;color:var(--text2);margin-bottom:.6rem;}
.song-msg{font-size:.78rem;font-style:italic;color:var(--text2);background:var(--bg);border-radius:var(--rmd);padding:.6rem .8rem;margin-bottom:.7rem;}
.song-footer{display:flex;align-items:center;justify-content:space-between;}
.song-voice{font-size:.65rem;font-weight:700;color:var(--text2);}
.song-dl{display:inline-flex;align-items:center;gap:.3rem;padding:.38rem .8rem;background:transparent;border:1.5px solid var(--border);border-radius:var(--rp);font-size:.65rem;font-weight:700;color:var(--text2);cursor:pointer;transition:all .18s;}
.song-dl:hover{border-color:var(--dark);color:var(--dark);}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:700;color:var(--text2);cursor:pointer;margin-bottom:.8rem;background:none;border:none;padding:0;}
.back-btn:hover{color:var(--dark);}

/* SEND BTN */
.btn-send{width:100%;padding:.85rem;background:var(--green);border:none;border-radius:var(--rp);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:800;color:white;cursor:pointer;margin-top:.6rem;transition:opacity .2s;}
.btn-send:hover{opacity:.88;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-text">EVOKE</div>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <span class="nav-plan none" id="nav-plan">—</span>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<!-- OVERLAY MODAL -->
<div class="overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-content"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div class="main">

  <!-- VUE: LISTE ÉVÉNEMENTS -->
  <div id="view-list">
    <div class="hero">
      <div class="hero-tag"><div class="hero-dot"></div>Mon espace EVOKE</div>
      <div class="hero-title" id="hero-title">Bonjour !</div>
      <div class="hero-sub">Gérez vos événements musicaux depuis votre espace personnel.</div>
      <div class="credits-row">
        <div class="credits-badge">
          <span class="credits-num" id="credits-num">—</span>
          <span class="credits-label">crédits disponibles</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-events" onclick="switchTab('events')">Mes événements</button>
      <button class="tab" id="tab-create" onclick="switchTab('create')">+ Nouvel événement</button>
      <button class="tab" id="tab-profile" onclick="switchTab('profile')">Mon profil</button>
    </div>

    <!-- ONGLET ÉVÉNEMENTS -->
    <div id="panel-events">
      <div class="section">
        <div class="section-head">
          <div class="section-title">Événements</div>
        </div>
        <div id="events-list"><div class="empty-state"><div class="empty-icon">🎵</div><div class="empty-text">Chargement…</div></div></div>
      </div>
    </div>

    <!-- ONGLET CRÉER -->
    <div id="panel-create" class="form-section">
      <div class="section">
        <div class="section-head">
          <div class="section-title">Nouvel événement</div>
        </div>
        <div class="alert error" id="create-err"></div>
        <div class="f2">
          <div class="field"><label>Prénom 1 *</label><input type="text" id="np1" placeholder="Sophie"></div>
          <div class="field"><label>Prénom 2 *</label><input type="text" id="np2" placeholder="Thomas"></div>
        </div>
        <div class="field"><label>Date de l'événement</label><input type="date" id="ndate"></div>
        <div class="field"><label>Nombre d'invités estimé</label><input type="number" id="nguests" placeholder="80" min="1"></div>
        <div class="field">
          <label>Crédits alloués *</label>
          <input type="number" id="ncredits" placeholder="50" min="1">
          <small>Nombre de musiques pouvant être générées</small>
        </div>
        <div class="field"><label>Email de contact</label><input type="email" id="nemail" placeholder="mariés@exemple.com"></div>
        <button class="btn-submit" onclick="createEvent()">Créer l'événement →</button>
        <button class="btn-secondary" onclick="switchTab('events')">Annuler</button>
      </div>
    </div>

    <!-- ONGLET PROFIL -->
    <div id="panel-profile" class="form-section">
      <div class="section">
        <div class="section-head">
          <div class="section-title">Mon profil</div>
        </div>
        <div class="profile-info" id="profile-info">
          <div class="empty-state"><div class="empty-text">Chargement…</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- VUE: DÉTAIL ÉVÉNEMENT -->
  <div id="view-detail" style="display:none">
    <div style="margin:1rem 0 .5rem">
      <button class="back-btn" onclick="showList()">← Retour aux événements</button>
    </div>
    <div class="detail-header" id="detail-header"></div>
    <div id="detail-songs"></div>
  </div>

</div>

<script>
var SESSION = null;
var events = [];
var currentEventId = null;

// ── INIT ──────────────────────────────────────────────────────────────────
window.onload = function() {
  var stored = localStorage.getItem('evoke_session');
  if(!stored) { window.location = '/login'; return; }
  try {
    SESSION = JSON.parse(stored);
    if(!SESSION.token) { window.location = '/login'; return; }
  } catch(e) { window.location = '/login'; return; }

  // Afficher les infos user
  var u = SESSION.user;
  document.getElementById('hero-title').textContent = 'Bonjour, ' + (u.firstName||u.email) + ' !';
  document.getElementById('nav-user').textContent = u.firstName + ' ' + u.lastName;
  var planEl = document.getElementById('nav-plan');
  planEl.textContent = u.plan||'Sans plan';
  planEl.className = 'nav-plan ' + (u.plan||'none');
  document.getElementById('credits-num').textContent = (u.credits||0) - (u.creditsUsed||0);

  loadEvents();
};

function logout() {
  localStorage.removeItem('evoke_session');
  window.location = '/login';
}

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['events','create','profile'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    var panel = document.getElementById('panel-'+t);
    if(panel) {
      if(t==='events') panel.style.display = name===t ? 'block' : 'none';
      else panel.classList.toggle('show', t===name);
    }
  });
  if(name==='profile') loadProfile();
}

// ── EVENTS ────────────────────────────────────────────────────────────────
async function loadEvents() {
  try {
    var r = await fetch('/api/events', {
      headers: { 'Authorization': 'Bearer ' + SESSION.token }
    });
    if(r.status === 401) { window.location = '/login?expired=1'; return; }
    events = await r.json();
    renderEvents();
  } catch(e) {
    document.getElementById('events-list').innerHTML = '<div class="empty-state"><div class="empty-text">Erreur de chargement</div></div>';
  }
}

function renderEvents() {
  var el = document.getElementById('events-list');
  if(!events.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">💍</div><div class="empty-text">Aucun événement pour l\'instant.<br>Créez votre premier événement !</div></div>';
    return;
  }
  el.innerHTML = events.map(function(e) {
    var songs = e.songs || [];
    var credits = (e.credits||0) - (e.usedCredits||0);
    var dateStr = e.date ? new Date(e.date+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) : 'Date non définie';
    return '<div class="ev-item" onclick="openEvent(\''+e.id+'\')">'+
      '<div class="ev-left">'+
        '<div class="ev-name">'+esc(e.couple||'—')+'</div>'+
        '<div class="ev-date">'+dateStr+'</div>'+
      '</div>'+
      '<div class="ev-right">'+
        '<span class="ev-songs">🎵 '+songs.length+'</span>'+
        '<span class="ev-credits">'+credits+' crédits</span>'+
        '<span class="ev-arrow">›</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ── CREATE EVENT ──────────────────────────────────────────────────────────
async function createEvent() {
  var p1 = document.getElementById('np1').value.trim();
  var p2 = document.getElementById('np2').value.trim();
  var date = document.getElementById('ndate').value;
  var guests = parseInt(document.getElementById('nguests').value)||80;
  var credits = parseInt(document.getElementById('ncredits').value)||50;
  var email = document.getElementById('nemail').value.trim();
  var errEl = document.getElementById('create-err');
  errEl.classList.remove('show');

  if(!p1||!p2) { errEl.textContent='Les deux prénoms sont requis.'; errEl.classList.add('show'); return; }
  if(!credits||credits<1) { errEl.textContent='Entrez un nombre de crédits valide.'; errEl.classList.add('show'); return; }

  var btn = document.querySelector('#panel-create .btn-submit');
  btn.disabled = true; btn.textContent = 'Création…';

  var token = Math.random().toString(36).substring(2)+Date.now().toString(36);
  var id = Date.now().toString(36)+Math.random().toString(36).substring(2);
  var ev = {
    id: id, couple: p1+' & '+p2, p1: p1, p2: p2,
    date: date, guests: guests, credits: credits,
    email: email, usedCredits: 0, songs: [],
    token: token, createdAt: new Date().toISOString(),
    user_id: SESSION.user.id
  };

  try {
    var r = await fetch('/api/event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+SESSION.token },
      body: JSON.stringify(ev)
    });
    if(!r.ok) throw new Error('Erreur serveur');
    toast('✦ Événement créé !');
    ['np1','np2','ndate','nguests','ncredits','nemail'].forEach(function(x){ document.getElementById(x).value=''; });
    await loadEvents();
    switchTab('events');
  } catch(e) {
    errEl.textContent = 'Erreur lors de la création.';
    errEl.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Créer l\'événement →';
}

// ── EVENT DETAIL ──────────────────────────────────────────────────────────
function openEvent(id) {
  currentEventId = id;
  var ev = events.find(function(e){ return e.id===id; });
  if(!ev) return;

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';

  var base = window.location.origin;
  var guestLink = base+'/mariage/'+id;
  var galleryLink = base+'/galerie/'+id+'?token='+ev.token;
  var songs = ev.songs || [];
  var credits = (ev.credits||0)-(ev.usedCredits||0);
  var dateStr = ev.date ? new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) : '';

  document.getElementById('detail-header').innerHTML =
    '<div class="detail-couple">'+esc(ev.couple)+'</div>'+
    '<div class="detail-date">'+(dateStr||'Date non définie')+'</div>'+
    '<div class="stat-row">'+
      '<div class="stat-box"><div class="stat-n">'+songs.length+'</div><div class="stat-l">Musiques</div></div>'+
      '<div class="stat-box"><div class="stat-n">'+credits+'</div><div class="stat-l">Crédits restants</div></div>'+
      '<div class="stat-box"><div class="stat-n">'+(ev.credits||0)+'</div><div class="stat-l">Crédits total</div></div>'+
    '</div>'+
    '<div class="detail-links">'+
      '<div class="link-row">'+
        '<span class="link-label">Invités</span>'+
        '<span class="link-val">'+guestLink+'</span>'+
        '<div class="link-actions">'+
          '<button class="link-btn" onclick="copyText(\''+guestLink+'\')">Copier</button>'+
          '<button class="link-btn" onclick="window.open(\''+guestLink+'\',\'_blank\')"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 8L8 2M8 2H4M8 2V6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'+
        '</div>'+
      '</div>'+
      '<div class="link-row">'+
        '<span class="link-label">Galerie</span>'+
        '<span class="link-val">'+galleryLink+'</span>'+
        '<div class="link-actions">'+
          '<button class="link-btn" onclick="copyText(\''+galleryLink+'\')">Copier</button>'+
          '<button class="link-btn" onclick="window.open(\''+galleryLink+'\',\'_blank\')"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 8L8 2M8 2H4M8 2V6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'+
        '</div>'+
      '</div>'+
    '</div>'+
    (ev.email ?
      '<button class="btn-send" onclick="sendInvite(\''+id+'\')">✉️ &nbsp;Envoyer les liens par email</button>' : '');

  // Songs
  var songsEl = document.getElementById('detail-songs');
  if(!songs.length) {
    songsEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🎵</div><div class="empty-text">Aucune musique générée pour cet événement.</div></div>';
    return;
  }
  songsEl.innerHTML = songs.map(function(s,i) {
    return '<div class="song-card">'+
      '<div class="song-title">'+esc(s.title||'Mélodie '+(i+1))+'</div>'+
      '<div class="song-meta">par '+esc(s.author||'—')+' · '+fmt(s.createdAt)+'</div>'+
      (s.message?'<div class="song-msg">"'+esc(s.message.substring(0,100))+(s.message.length>100?'…':'')+'"</div>':'')+
      (s.url?'<audio controls src="'+s.url+'" style="width:100%;margin-bottom:.6rem;accent-color:#3ecf6a"></audio>':'')+
      '<div class="song-footer">'+
        '<span class="song-voice">'+(s.voice==='female'?'👩 Voix féminine':'👨 Voix masculine')+'</span>'+
        (s.url?'<button class="song-dl" onclick="dlSong(\''+s.url+'\',\''+esc(s.author||'evoke')+'\')"><svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M5 1v7M1 5.5L5 9.5l4-4M1 11h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Télécharger</button>':'')+
      '</div>'+
    '</div>';
  }).join('');
}

function showList() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
  currentEventId = null;
}

// ── PROFILE ───────────────────────────────────────────────────────────────
async function loadProfile() {
  try {
    var r = await fetch('/api/auth-profile', {
      headers: { 'Authorization': 'Bearer '+SESSION.token }
    });
    var u = await r.json();
    document.getElementById('profile-info').innerHTML =
      row('Prénom', u.firstName)+
      row('Nom', u.lastName)+
      row('Email', u.email)+
      (u.phone?row('Téléphone', u.phone):'')+
      row('Type de compte', u.accountType==='professional'?'Professionnel':'Particulier')+
      (u.company?row('Société', u.company):'')+
      (u.siret?row('SIRET', u.siret):'')+
      (u.city?row('Ville', u.zip+' '+u.city):'')+
      row('Plan', u.plan||'Aucun plan')+
      row('Crédits disponibles', ((u.credits||0)-(u.creditsUsed||0))+' / '+(u.credits||0));
  } catch(e) {
    document.getElementById('profile-info').innerHTML = '<div class="empty-state"><div class="empty-text">Erreur de chargement</div></div>';
  }
}

function row(label, value) {
  return '<div class="info-row"><span class="info-label">'+label+'</span><span class="info-value">'+esc(String(value||'—'))+'</span></div>';
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
async function sendInvite(id) {
  var ev = events.find(function(e){ return e.id===id; });
  if(!ev||!ev.email) return;
  toast('📧 Envoi en cours…');
  var base = window.location.origin;
  try {
    var r = await fetch('/api/send-invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: ev.email, p1: ev.p1, p2: ev.p2, date: ev.date,
        guestLink: base+'/mariage/'+id,
        galleryLink: base+'/galerie/'+id+'?token='+ev.token
      })
    });
    if(r.ok) toast('✅ Email envoyé !');
    else toast('❌ Erreur envoi email');
  } catch(e) { toast('❌ Erreur réseau'); }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(function(){ toast('✓ Lien copié !'); }).catch(function(){ toast('Copiez manuellement'); });
}

async function dlSong(url, author) {
  try {
    var r = await fetch(url);
    var blob = await r.blob();
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'evoke-'+author.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.mp3';
    a.click();
  } catch(e) { window.open(url,'_blank'); }
}

function fmt(iso){ try{ return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch{ return '—'; } }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2800); }
</script>
