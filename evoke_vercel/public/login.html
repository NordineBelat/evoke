<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EVOKE — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f2f2f7;--white:#fff;--dark:#111118;--text:#111118;--text2:#6b6b80;--text3:#aeaec0;--green:#b8f0c8;--green2:#3ecf6a;--red:#ff6b6b;--border:rgba(0,0,0,0.07);--sh:0 4px 24px rgba(0,0,0,0.07);--rmd:24px;--rlg:32px;--rxl:40px;--rp:100px;}
html,body{min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
.logo{margin-bottom:2rem;text-align:center;}
.logo-text{font-size:1.8rem;font-weight:800;color:var(--dark);letter-spacing:-.04em;}
.logo-sub{font-size:.7rem;font-weight:600;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.card{background:var(--white);border-radius:var(--rxl);padding:2rem;width:100%;max-width:420px;box-shadow:var(--sh);}
.card-title{font-size:1.2rem;font-weight:800;color:var(--dark);margin-bottom:.3rem;}
.card-sub{font-size:.8rem;color:var(--text2);margin-bottom:1.6rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.68rem;font-weight:800;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;}
.field input{width:100%;background:var(--bg);border:none;border-radius:var(--rmd);padding:.85rem 1.1rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:box-shadow .2s;}
.field input:focus{box-shadow:0 0 0 2.5px rgba(17,17,24,.15);}
.field input::placeholder{color:var(--text3);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:2.8rem;}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:.85rem;color:var(--text3);padding:.3rem;}
.btn{width:100%;padding:1rem;background:var(--dark);border:none;border-radius:var(--rxl);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:800;color:white;cursor:pointer;transition:all .2s;margin-top:.5rem;}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(17,17,24,.25);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-green{background:var(--green2);}
.divider{text-align:center;font-size:.72rem;color:var(--text3);margin:1.2rem 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.link-row{text-align:center;font-size:.78rem;color:var(--text2);margin-top:1.2rem;}
.link-row a{color:var(--dark);font-weight:700;text-decoration:none;}
.link-row a:hover{text-decoration:underline;}
.alert{border-radius:var(--rmd);padding:.8rem 1rem;font-size:.78rem;font-weight:600;margin-bottom:1rem;display:none;}
.alert.error{background:rgba(255,107,107,.1);color:#c0392b;border:1px solid rgba(255,107,107,.3);}
.alert.success{background:rgba(62,207,106,.1);color:#1a5c2a;border:1px solid rgba(62,207,106,.3);}
.alert.show{display:block;}
</style>
</head>
<body>
<div class="logo">
  <div class="logo-text">EVOKE</div>
  <div class="logo-sub">Génération musicale pour événements</div>
</div>

<div class="card">
  <div class="card-title">Connexion</div>
  <div class="card-sub">Accédez à votre espace professionnel</div>

  <div class="alert error" id="alert-error"></div>
  <div class="alert success" id="alert-success"></div>

  <div class="field">
    <label>Adresse email</label>
    <input type="email" id="email" placeholder="vous@exemple.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Mot de passe</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
      <button class="pw-toggle" onclick="togglePw('password')">👁</button>
    </div>
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">Se connecter →</button>

  <div class="link-row" style="margin-top:.8rem">
    <a href="/reset-password">Mot de passe oublié ?</a>
  </div>

  <div class="divider">ou</div>

  <button class="btn btn-green" onclick="window.location='/register'">Créer un compte</button>
</div>

<script>
// Vérifier si déjà connecté
const stored = localStorage.getItem('evoke_session');
if (stored) {
  try {
    const s = JSON.parse(stored);
    if (s.token) window.location = '/dashboard';
  } catch(e) {}
}

// Message de succès si email vérifié
const params = new URLSearchParams(window.location.search);
if (params.get('verified') === '1') {
  const a = document.getElementById('alert-success');
  a.textContent = '✅ Email confirmé ! Vous pouvez maintenant vous connecter.';
  a.classList.add('show');
}
if (params.get('expired') === '1') {
  const a = document.getElementById('alert-error');
  a.textContent = 'Votre session a expiré. Veuillez vous reconnecter.';
  a.classList.add('show');
}

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('alert-error');
  errEl.classList.remove('show');

  if (!email || !password) {
    errEl.textContent = 'Veuillez remplir tous les champs.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Connexion…';

  try {
    const r = await fetch('/api/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();

    if (!r.ok) {
      errEl.textContent = data.error || 'Erreur de connexion';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Se connecter →';
      return;
    }

    // Sauvegarder la session
    localStorage.setItem('evoke_session', JSON.stringify({
      token: data.token,
      refreshToken: data.refresh_token,
      user: data.user
    }));

    window.location = '/dashboard';

  } catch (e) {
    errEl.textContent = 'Erreur réseau. Vérifiez votre connexion.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
  }
}
</script>
</body>
</html>
